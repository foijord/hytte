<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Kalsneset 27 — terrain</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0b1420; }
  #app { width: 100%; height: 100%; }
  #hud {
    position: fixed; top: 10px; left: 12px; color: #cfe0f0;
    font: 13px/1.5 system-ui, sans-serif; pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }
  #hud b { color: #ffe95c; }
  #hud button {
    pointer-events: auto; margin-top: 4px; padding: 2px 10px;
    background: #1d3450; color: #cfe0f0; border: 1px solid #3c5a80;
    border-radius: 4px; font: 12px system-ui, sans-serif; cursor: pointer;
  }
  #hud button:hover { background: #29486e; }
  #hud a { pointer-events: auto; color: #7fb2d9; text-decoration: none; }
  #hud a:hover { text-decoration: underline; }
  #hud input[type=range] { pointer-events: auto; vertical-align: middle; width: 92px; }
  #sunctl { color: #ffd27f; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./js/vendor/three.module.js",
    "three/addons/": "./js/vendor/addons/"
  }
}
</script>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <b>Kalsneset 27</b> · gnr/bnr 437/109 · Kristiansand<br>
  <span id="status">loading terrain…</span><br>
  drag: orbit · scroll: zoom · right-drag: pan · dbl-click: set orbit point<br>
  <span id="selinfo"></span><br>
  <button id="save">save</button>
  <button id="reset">reset edits</button>
  <button id="excav">terrain cut: on</button>
  <button id="newb">new build: off</button>
  <button id="labels">labels: off</button>
  <button id="sun">sun: on</button>
  <span id="sunctl">
    <input id="sunmonth" type="range" min="1" max="12" step="0.25" value="6.5" title="month">
    <input id="sunhour" type="range" min="4" max="22" step="0.25" value="15" title="hour (solar)">
    <span id="sunlabel"></span>
  </span><br>
  <a href="docs.html?doc=plan">build plan</a> ·
  <a href="docs/floorplan.svg">floor plan</a> ·
  <a href="https://github.com/foijord/hytte">repo</a>
</div>
<script type="module" src="js/main.js?v=6"></script>
</body>
</html>
